name: Generate Contribution Snake

on:
  schedule:
    - cron: "0 6 * * *"   # каждый день в 06:00 UTC
  workflow_dispatch:        # можно запустить вручную
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: Platane/snk/action_push_to_branch@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          branch: output
          outputs: |
            dist/snake.svg
            dist/snake-dark.svg?palette=github-dark
